<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ListeningAI - Test Console</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e7e9ee;
    --muted: #8a90a2;
    --accent: #5b8cff;
    --accent-2: #37d19a;
    --danger: #ff5b6e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: 0.3px; }
  header h1 span { color: var(--accent); }
  #whoami { font-size: 13px; color: var(--muted); }
  #logoutBtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-left: 10px;
  }
  #logoutBtn:hover { color: var(--text); border-color: var(--accent); }

  main { flex: 1; display: flex; overflow: hidden; }

  nav {
    width: 150px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 10px 0;
    flex-shrink: 0;
  }
  nav button {
    background: none; border: none; color: var(--muted); text-align: left;
    padding: 10px 16px; cursor: pointer; font-size: 13px; border-left: 3px solid transparent;
  }
  nav button.active { color: var(--text); border-left-color: var(--accent); background: var(--panel-2); }
  nav button:hover { color: var(--text); }

  .view { flex: 1; display: none; overflow-y: auto; padding: 16px; }
  .view.active { display: flex; flex-direction: column; }

  /* --- auth --- */
  #authView { align-items: center; justify-content: center; }
  .authBox { width: 320px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 24px; }
  .authBox h2 { margin-top: 0; font-size: 16px; }
  .authBox input {
    width: 100%; padding: 9px 10px; margin: 6px 0; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px;
  }
  .authBox button {
    width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 6px;
    background: var(--accent); color: white; font-weight: 600; cursor: pointer; font-size: 13px;
  }
  .authToggle { text-align: center; margin-top: 12px; font-size: 12px; color: var(--muted); cursor: pointer; }
  .authToggle:hover { color: var(--accent); }
  #authError { color: var(--danger); font-size: 12px; min-height: 16px; margin-top: 4px; }

  /* --- chat --- */
  #chatView { padding: 0; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 75%; padding: 9px 13px; border-radius: 10px; font-size: 14px; line-height: 1.4; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--accent); color: white; }
  .msg.assistant { align-self: flex-start; background: var(--panel-2); border: 1px solid var(--border); }
  .msg.system { align-self: center; background: none; color: var(--muted); font-size: 11px; font-style: italic; }
  .toolTrace { align-self: flex-start; font-size: 11px; color: var(--accent-2); background: #10241d; border: 1px solid #1f3d31; padding: 6px 10px; border-radius: 8px; max-width: 80%; }
  .toolTrace summary { cursor: pointer; color: var(--accent-2); }
  #inputBar { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--panel); }
  #inputBar input {
    flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--panel-2); color: var(--text); font-size: 14px;
  }
  #inputBar button {
    padding: 10px 18px; border: none; border-radius: 8px; background: var(--accent);
    color: white; font-weight: 600; cursor: pointer;
  }
  #inputBar button:disabled { opacity: 0.5; cursor: default; }

  /* --- panels (profile/settings/inbox/notifications) --- */
  .panelHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .panelHeader h2 { font-size: 15px; margin: 0; }
  .panelHeader button {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .kvRow { display: flex; gap: 8px; margin-bottom: 8px; }
  .kvRow input { flex: 1; padding: 7px 9px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); }
  .kvRow button { padding: 7px 12px; background: var(--accent); border: none; border-radius: 6px; color: white; cursor: pointer; }
  pre.jsonBlock {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; font-size: 12px; overflow-x: auto; color: var(--text);
  }
  .card {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; margin-bottom: 8px; font-size: 13px;
  }
  .card .meta { color: var(--muted); font-size: 11px; margin-top: 4px; }
  .card.unread { border-left: 3px solid var(--accent); }
  .empty { color: var(--muted); font-size: 13px; font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>Listening<span>AI</span> · Test Console</h1>
  <div>
    <span id="whoami"></span>
    <button id="logoutBtn" style="display:none">Log out</button>
  </div>
</header>

<main>
  <nav id="nav" style="display:none">
    <button data-view="chatView" class="active">Chat</button>
    <button data-view="profileView">Profile</button>
    <button data-view="settingsView">Settings</button>
    <button data-view="inboxView">Inbox</button>
    <button data-view="notificationsView">Notifications</button>
  </nav>

  <!-- AUTH -->
  <div id="authView" class="view active">
    <div class="authBox">
      <h2 id="authTitle">Log in</h2>
      <input id="authUsername" placeholder="Username" autocomplete="username">
      <input id="authPassword" type="password" placeholder="Password" autocomplete="current-password">
      <button id="authSubmit">Log in</button>
      <div id="authError"></div>
      <div class="authToggle" id="authToggle">Need an account? Register</div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chatView" class="view">
    <div id="messages"></div>
    <div id="inputBar">
      <input id="chatInput" placeholder="Ask me to do something on this site..." autocomplete="off">
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <!-- PROFILE -->
  <div id="profileView" class="view">
    <div class="panelHeader"><h2>Profile</h2><button data-refresh="profile">Refresh</button></div>
    <div class="kvRow">
      <input id="profileField" placeholder="field (e.g. name)">
      <input id="profileValue" placeholder="value">
      <button id="profileSave">Save</button>
    </div>
    <pre class="jsonBlock" id="profileJson">{}</pre>
  </div>

  <!-- SETTINGS -->
  <div id="settingsView" class="view">
    <div class="panelHeader"><h2>Settings</h2><button data-refresh="settings">Refresh</button></div>
    <div class="kvRow">
      <input id="settingsField" placeholder="field (e.g. tone)">
      <input id="settingsValue" placeholder="value">
      <button id="settingsSave">Save</button>
    </div>
    <pre class="jsonBlock" id="settingsJson">{}</pre>
  </div>

  <!-- INBOX -->
  <div id="inboxView" class="view">
    <div class="panelHeader"><h2>Inbox</h2><button data-refresh="inbox">Refresh</button></div>
    <div class="kvRow">
      <input id="msgTo" placeholder="to_username">
      <input id="msgBody" placeholder="message body">
      <button id="msgSend">Send</button>
    </div>
    <div id="inboxList"></div>
  </div>

  <!-- NOTIFICATIONS -->
  <div id="notificationsView" class="view">
    <div class="panelHeader"><h2>Notifications</h2><button data-refresh="notifications">Refresh</button></div>
    <div class="kvRow">
      <input id="notifText" placeholder="notification text (for testing)">
      <button id="notifCreate">Create</button>
    </div>
    <div id="notifList"></div>
  </div>
</main>

<script>
const API = window.location.origin;
let state = { token: localStorage.getItem('la_token') || null,
              username: localStorage.getItem('la_username') || null,
              sessionId: localStorage.getItem('la_session_id') || null,
              mode: 'login' };

function authHeaders() {
  return state.token ? { 'Authorization': 'Bearer ' + state.token } : {};
}

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...authHeaders(),
      ...(opts.headers || {}),
    },
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
  return data;
}

// ---------------- auth ----------------

function setLoggedIn(username, token) {
  state.token = token;
  state.username = username;
  localStorage.setItem('la_token', token);
  localStorage.setItem('la_username', username);
  document.getElementById('authView').classList.remove('active');
  document.getElementById('nav').style.display = 'flex';
  document.getElementById('whoami').textContent = username;
  document.getElementById('logoutBtn').style.display = 'inline-block';
  showView('chatView');
  addSystemMessage(`Logged in as ${username}. Try: "what's my profile look like?" or "remind me to drink water"`);
}

function logout() {
  state.token = null; state.username = null; state.sessionId = null;
  localStorage.removeItem('la_token'); localStorage.removeItem('la_username'); localStorage.removeItem('la_session_id');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('nav').style.display = 'none';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('whoami').textContent = '';
  showView('authView');
}

document.getElementById('authToggle').onclick = () => {
  state.mode = state.mode === 'login' ? 'register' : 'login';
  document.getElementById('authTitle').textContent = state.mode === 'login' ? 'Log in' : 'Register';
  document.getElementById('authSubmit').textContent = state.mode === 'login' ? 'Log in' : 'Register';
  document.getElementById('authToggle').textContent = state.mode === 'login' ? 'Need an account? Register' : 'Have an account? Log in';
  document.getElementById('authError').textContent = '';
};

document.getElementById('authSubmit').onclick = async () => {
  const username = document.getElementById('authUsername').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = 'Enter a username and password.'; return; }
  try {
    const data = await api(state.mode === 'login' ? '/login' : '/register', {
      method: 'POST', body: JSON.stringify({ username, password }),
    });
    setLoggedIn(data.username, data.token);
  } catch (e) {
    errEl.textContent = e.message;
  }
};

document.getElementById('logoutBtn').onclick = logout;

// ---------------- nav ----------------

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.view === id));
  if (id === 'profileView') loadProfile();
  if (id === 'settingsView') loadSettings();
  if (id === 'inboxView') loadInbox();
  if (id === 'notificationsView') loadNotifications();
}

document.querySelectorAll('nav button').forEach(btn => {
  btn.onclick = () => showView(btn.dataset.view);
});

document.querySelectorAll('[data-refresh]').forEach(btn => {
  btn.onclick = () => {
    const kind = btn.dataset.refresh;
    if (kind === 'profile') loadProfile();
    if (kind === 'settings') loadSettings();
    if (kind === 'inbox') loadInbox();
    if (kind === 'notifications') loadNotifications();
  };
});

// ---------------- chat ----------------

function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ block: 'end' });
  return el;
}

function addSystemMessage(text) { addMessage('system', text); }

function addToolTrace(toolCalls) {
  if (!toolCalls || !toolCalls.length) return;
  const wrap = document.createElement('details');
  wrap.className = 'toolTrace';
  const summary = document.createElement('summary');
  summary.textContent = `used ${toolCalls.length} tool${toolCalls.length > 1 ? 's' : ''}: ` +
    toolCalls.map(t => t.name).join(', ');
  wrap.appendChild(summary);
  const pre = document.createElement('pre');
  pre.style.margin = '6px 0 0';
  pre.style.whiteSpace = 'pre-wrap';
  pre.textContent = toolCalls.map(t => `${t.name}(${JSON.stringify(t.input)}) -> ${t.result}`).join('\n');
  wrap.appendChild(pre);
  document.getElementById('messages').appendChild(wrap);
  wrap.scrollIntoView({ block: 'end' });
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  addMessage('user', text);

  try {
    const body = { message: text };
    if (state.sessionId) body.session_id = state.sessionId;
    const data = await api('/chat', { method: 'POST', body: JSON.stringify(body) });
    state.sessionId = data.session_id;
    localStorage.setItem('la_session_id', data.session_id);
    addToolTrace(data.tool_calls);
    addMessage('assistant', data.response);
  } catch (e) {
    addSystemMessage('Error: ' + e.message);
  } finally {
    document.getElementById('sendBtn').disabled = false;
  }
}

document.getElementById('sendBtn').onclick = sendChat;
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendChat();
});

// ---------------- profile ----------------

async function loadProfile() {
  const data = await api('/profile');
  document.getElementById('profileJson').textContent = JSON.stringify(data.profile, null, 2);
}

document.getElementById('profileSave').onclick = async () => {
  const field = document.getElementById('profileField').value.trim();
  const value = document.getElementById('profileValue').value;
  if (!field) return;
  await api('/profile', { method: 'PUT', body: JSON.stringify({ updates: { [field]: value } }) });
  document.getElementById('profileField').value = '';
  document.getElementById('profileValue').value = '';
  loadProfile();
};

// ---------------- settings ----------------

async function loadSettings() {
  const data = await api('/settings');
  document.getElementById('settingsJson').textContent = JSON.stringify(data.settings, null, 2);
}

document.getElementById('settingsSave').onclick = async () => {
  const field = document.getElementById('settingsField').value.trim();
  const value = document.getElementById('settingsValue').value;
  if (!field) return;
  await api('/settings', { method: 'PUT', body: JSON.stringify({ updates: { [field]: value } }) });
  document.getElementById('settingsField').value = '';
  document.getElementById('settingsValue').value = '';
  loadSettings();
};

// ---------------- inbox ----------------

async function loadInbox() {
  const data = await api('/inbox');
  const list = document.getElementById('inboxList');
  list.innerHTML = '';
  if (!data.messages.length) { list.innerHTML = '<div class="empty">No messages.</div>'; return; }
  data.messages.slice().reverse().forEach(m => {
    const card = document.createElement('div');
    card.className = 'card' + (m.read ? '' : ' unread');
    card.innerHTML = `<div>${escapeHtml(m.body)}</div><div class="meta">from ${escapeHtml(m.from)} · ${m.ts}${m.read ? '' : ' · unread'}</div>`;
    if (!m.read) {
      card.style.cursor = 'pointer';
      card.title = 'Click to mark read';
      card.onclick = async () => { await api(`/inbox/${m.id}/read`, { method: 'POST' }); loadInbox(); };
    }
    list.appendChild(card);
  });
}

document.getElementById('msgSend').onclick = async () => {
  const to_username = document.getElementById('msgTo').value.trim();
  const body = document.getElementById('msgBody').value.trim();
  if (!to_username || !body) return;
  try {
    await api('/inbox', { method: 'POST', body: JSON.stringify({ to_username, body }) });
    document.getElementById('msgTo').value = '';
    document.getElementById('msgBody').value = '';
    loadInbox();
  } catch (e) {
    alert(e.message);
  }
};

// ---------------- notifications ----------------

async function loadNotifications() {
  const data = await api('/notifications');
  const list = document.getElementById('notifList');
  list.innerHTML = '';
  if (!data.notifications.length) { list.innerHTML = '<div class="empty">No notifications.</div>'; return; }
  data.notifications.slice().reverse().forEach(n => {
    const card = document.createElement('div');
    card.className = 'card' + (n.read ? '' : ' unread');
    card.innerHTML = `<div>${escapeHtml(n.text)}</div><div class="meta">${n.ts}${n.read ? '' : ' · unread'}</div>`;
    if (!n.read) {
      card.style.cursor = 'pointer';
      card.title = 'Click to mark read';
      card.onclick = async () => { await api(`/notifications/${n.id}/read`, { method: 'POST' }); loadNotifications(); };
    }
    list.appendChild(card);
  });
}

document.getElementById('notifCreate').onclick = async () => {
  const text = document.getElementById('notifText').value.trim();
  if (!text) return;
  await api('/notifications', { method: 'POST', body: JSON.stringify({ text }) });
  document.getElementById('notifText').value = '';
  loadNotifications();
};

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// ---------------- boot ----------------

if (state.token && state.username) {
  document.getElementById('authView').classList.remove('active');
  document.getElementById('nav').style.display = 'flex';
  document.getElementById('whoami').textContent = state.username;
  document.getElementById('logoutBtn').style.display = 'inline-block';
  showView('chatView');
  addSystemMessage(`Welcome back, ${state.username}.`);
}
</script>
</body>
</html>
